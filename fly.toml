# Fly.io configuration for Chronicle backend
# Deploy with: fly launch (first time) or fly deploy

app = "chronicle-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DUCKDB_PATH = "/data/chronicle.db"

[mounts]
  # Persistent volume — memories survive redeploys (free: 3 GB)
  # Create once with: fly volumes create chronicle_data --size 1
  source = "chronicle_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
